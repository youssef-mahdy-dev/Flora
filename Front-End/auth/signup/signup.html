<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  </head>
  <body>
    <div class="auth-box">
      <h2>Create Farmer Account</h2>
      <form id="signup-form">
        <div style="display: flex; gap: 10px">
          <input type="text" id="firstname" placeholder="First Name" required />
          <input type="text" id="lastname" placeholder="Last Name" required />
        </div>
        <input type="email" id="email" placeholder="Email Address" required />
        <input
          type="text"
          id="phone"
          placeholder="Phone Number (e.g. 012...)"
          required
        />
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <i
            class="fas fa-eye toggle-password"
            onclick="togglePass('password', this)"
          ></i>
        </div>

        <div class="password-wrapper">
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required
          />
          <i
            class="fas fa-eye toggle-password"
            onclick="togglePass('confirmPassword', this)"
          ></i>
        </div>

        <button type="submit" class="auth-btn">Sign Up</button>
      </form>
      <p>Already have an account? <a href="../login/login.html">Login</a></p>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script>
      const form = document.getElementById("signup-form");

      form.onsubmit = async (e) => {
        e.preventDefault();

        // 1. تجميع البيانات من الـ IDs الجديدة اللي إنت لسه ضايفها
        const formData = {
          firstname: document.getElementById("firstname").value,
          lastname: document.getElementById("lastname").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          password: document.getElementById("password").value,
          confirmPassword: document.getElementById("confirmPassword").value,
        };

        console.log("Sending Data:", formData); // عشان تشوف البيانات في الـ Console قبل ما تتبعت

        try {
          const response = await fetch(
            "http://localhost:3000/api/v1/auth/signup",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(formData),
            },
          );

          const result = await response.json();

          if (response.ok) {
            showToast(result.message, "success"); // استخدام التوست
            setTimeout(() => {
              window.location.href = "../confirm-email/confirm.email..html";
            }, 2000); // استنى شوية عشان يلحق يشوف الرسالة
          } else {
            showToast(result.message || "Signup Failed", "error"); // رسالة حمراء
          }
        } catch (err) {
          showToast("Connection Error! Backend is down.", "error");
        }
      };

      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;

        // إضافة أيقونة بسيطة
        const icon = type === "success" ? "✅" : "❌";
        toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;

        container.appendChild(toast);

        // تختفي بعد 3 ثواني
        setTimeout(() => {
          toast.classList.add("fade-out");
          setTimeout(() => toast.remove(), 500);
        }, 3000);
      }


      function togglePass(inputId, icon) {
    const input = document.getElementById(inputId);
    
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
    </script>
  </body>
</html>
