<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="login.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">


</head>
<body>
   <div class="auth-box">
    <h2>Welcome Back</h2>
    <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" style="padding-top: 10px;" onclick="togglePass('password', this)"></i>
        </div>
      
        <div style="text-align: right; margin-bottom: 15px;">
            <a href="../forget-password/forget.password.html" style="font-size: 12px; color: #2d6a4f; text-decoration: none; font-weight: 500;">Forgot Password?</a>
        </div>
        
        <button type="submit" class="auth-btn">Login</button>
    </form>
    <p>New farmer? <a href="../signup/signup.html">Join us</a></p>
</div>

<div id="toast-container" class="toast-container"></div>
<script>


    // 1. دالة إظهار وإخفاء الباسورد
function togglePass(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

// 2. دالة الرسائل الاحترافية (Toast)
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? '✅' : '❌';
    toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
    container.appendChild(toast);

    setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

// 3. تعديل الـ Form Submit
const form = document.getElementById('login-form');
form.onsubmit = async (e) => {
    e.preventDefault();

    const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    try {
        const response = await fetch('http://localhost:3000/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (response.ok) {
            localStorage.setItem('accessToken', result.data.accessToken);
            localStorage.setItem('refreshToken', result.data.refreshToken);
            localStorage.setItem('userName', result.data.user.firstname);
            
            showToast("Welcome to FLORA! Redirecting...", "success");
            
            setTimeout(() => {
                window.location.href = '../../index.html'; 
            }, 1500);
        } else {
            showToast(result.message || "Login Failed", "error");
        }
    } catch (err) {
        showToast("Server Connection Error!", "error");
    }
};
</script>
</body>
</html>
