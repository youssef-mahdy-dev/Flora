<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FLORA</title>
    <link rel="stylesheet" href="forget.password.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
<div class="auth-box">
    <div class="lock-icon">
        <i class="fas fa-unlock-alt"></i>
    </div>
    <h2>Forgot Password?</h2>
    <p class="subtitle">No worries! Enter your email and we'll send you a 5-digit recovery code.</p>
    
    <form id="forget-form">
        <input type="email" id="email" placeholder="Enter your email address" required>
        <button type="submit" class="auth-btn">Send Reset Code</button>
    </form>
    
    <a href="../login/login.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>
</div>

<div id="toast-container" class="toast-container"></div>

<script>
    // دالة الرسائل الاحترافية (Toast)
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? '✅' : '❌';
    toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
    container.appendChild(toast);

    setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

const form = document.getElementById('forget-form');
form.onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;

    try {
        const response = await fetch('http://localhost:3000/api/v1/auth/forget-password', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const result = await response.json();

        if (response.ok) {
            showToast("Success! Check your email for the code.", "success");
            
            // استنى ثانية ونص عشان يشوف الرسالة وبعدين حوله لصفحة الريسيت
            setTimeout(() => {
                window.location.href = "../reset-password/reset.password.html?email=" + email;
            }, 1500);
        } else {
            showToast(result.message || "Error occurred", "error");
        }
    } catch (err) {
        showToast("Connection Error!", "error");
    }
};
</script>

</body>
</html>
