<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FLORA</title>
    <link rel="stylesheet" href="reset.password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<div class="auth-box">
    <div class="lock-icon">
        <i class="fas fa-key"></i>
    </div>
    <h2>Set New Password</h2>
    <p class="subtitle">Enter the 5-digit code sent to your email and choose a strong new password.</p>
    <div id="timer-container" class="timer-style">
    Code expires in: <span id="countdown">05:00</span>
</div>
    
    <form id="reset-form">
        <input type="text" id="otp" placeholder="Enter 5-digit OTP" maxlength="5" required style="text-align: center; letter-spacing: 5px;">
       <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="New Password" required>
            <i class="fas fa-eye toggle-password" style="padding-bottom: 15px;" onclick="togglePass('newPassword', this)"></i>
        </div>

        <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
            <i class="fas fa-eye toggle-password" style="padding-bottom: 15px;" onclick="togglePass('confirmPassword', this)"></i>
        </div>
        
        <button type="submit" class="auth-btn">Update Password</button>
    </form>
    
    <a href="../login/login.html" class="back-link">Back to Login</a>
</div>

<div id="toast-container" class="toast-container"></div>

<script>

    // 1. استخراج الإيميل من الـ URL ضروري جداً
const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get('email');

const form = document.getElementById('reset-form');

// 2. دالة العداد التنازلي (لازم تكون موجودة عشان الـ countdown يشتغل)
function startTimer(duration, display) {
    let timer = duration, minutes, seconds;
    const btn = document.querySelector('.auth-btn');
    const countdownInterval = setInterval(function () {
        minutes = parseInt(timer / 60, 10);
        seconds = parseInt(timer % 60, 10);
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        display.textContent = minutes + ":" + seconds;
        if (--timer < 0) {
            clearInterval(countdownInterval);
            display.textContent = "EXPIRED";
            btn.disabled = true;
            btn.style.background = "#ccc";
            showToast("OTP Expired! Please request a new one.", "error");
        }
    }, 1000);
}

window.onload = function () {
    const display = document.querySelector('#countdown');
    if(display) startTimer(60 * 5, display);
};
   // 1. دالة إظهار وإخفاء الباسورد
function togglePass(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

// 2. دالة الرسائل الاحترافية (Toast)
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? '✅' : '❌';
    toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
    container.appendChild(toast);

    setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

// 3. تعديل الـ Form Submit لاستخدام الـ Toast
form.onsubmit = async (e) => {
    e.preventDefault();
    const data = {
        email: email,
        otp: document.getElementById('otp').value,
        password: document.getElementById('newPassword').value,
        confirmPassword: document.getElementById('confirmPassword').value
    };

    if (data.password !== data.confirmPassword) {
        return showToast("Passwords do not match!", "error");
    }

    try {
        const response = await fetch('http://localhost:3000/api/v1/auth/reset-password', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            showToast("Password Updated Successfully!", "success");
            setTimeout(() => {
                window.location.href = '../login/login.html';
            }, 2000);
        } else {
            showToast(result.message || "Reset Failed", "error");
        }
    } catch (err) {
        showToast("Connection Error!", "error");
    }
};
</script>

</body>
</html>
